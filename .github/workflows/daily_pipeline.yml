# .github/workflows/daily_pipeline.yml
# NSE Swing Trader — Full Pipeline
#
# THREE scheduled runs:
#   1. 09:15 AM IST (03:45 UTC) Mon–Fri — morning alert using yesterday's close
#   2. 06:30 PM IST (13:00 UTC) Mon–Fri — evening scoring using today's close
#   3. 10:00 AM IST (04:30 UTC) Saturday — weekend accuracy review
#
# Why two daily runs:
#   Morning run  → Bhavcopy has yesterday's close. Alerts you before market opens.
#   Evening run  → Bhavcopy published ~5:30 PM with TODAY's actual close.
#                  Scores are more accurate. Gives you signals for tomorrow.
#   They do NOT have the same data. Evening run is strictly more accurate.

name: NSE Daily Pipeline

on:
  schedule:
    - cron: "45 3 * * 1-5"    # 09:15 AM IST Mon–Fri (morning alert)
    - cron: "0 13 * * 1-5"    # 06:30 PM IST Mon–Fri (evening scoring)
    - cron: "30 4 * * 6"      # 10:00 AM IST Saturday (weekend review)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    name: Fetch → Regime → Score → Analyse → Alert
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p data logs

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/trades.db
          key: trades-db-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            trades-db-${{ runner.os }}-

      - name: Initialise database
        run: python create_db.py

      - name: Restore trades from backup
        run: python backup_trades.py --restore
        continue-on-error: true

      - name: Fetch market data
        run: python fetch_data.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Detect market regime
        run: python regime_engine.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Score all stocks
        run: python score_stocks.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run daily analysis with reasoning
        run: python daily_analysis.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      # Weekend review — only runs on Saturday trigger
      - name: Weekend accuracy review
        if: github.event.schedule == '30 4 * * 6'
        run: python weekend_review.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Backup trades to JSON
        run: python backup_trades.py --backup

      - name: Commit trades backup
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trades_backup.json
          git diff --staged --quiet || git commit -m "chore: auto-backup trades [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save database cache
        uses: actions/cache@v4
        with:
          path: data/trades.db
          key: trades-db-${{ runner.os }}-${{ github.run_number }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 7
