# .github/workflows/daily_pipeline.yml
# Runs the NSE Swing Trader pipeline every weekday at 08:00 IST (02:30 UTC)
# Free tier — uses ubuntu-latest runner
# Secrets required in GitHub repo settings:
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID

name: NSE Daily Pipeline

on:
  schedule:
    # 02:30 UTC = 08:00 IST (UTC+5:30)
    # Runs Mon–Fri only
    - cron: "30 2 * * 1-5"

  # Allow manual trigger from GitHub Actions UI (for testing)
  workflow_dispatch:

jobs:
  run-pipeline:
    name: Fetch → Score → Alert
    runs-on: ubuntu-latest
    timeout-minutes: 20          # kill if stuck — protects free minutes

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Restore SQLite DB from cache ─────────────────────────────────────
      # GitHub Actions runners are stateless — we cache the DB between runs
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/trades.db
          key: trades-db-${{ runner.os }}
          restore-keys: |
            trades-db-

      # ── 5. Ensure DB tables exist ────────────────────────────────────────────
      - name: Initialise database
        run: python create_db.py

      # ── 6. Fetch OHLCV data ──────────────────────────────────────────────────
      - name: Fetch market data
        run: python fetch_data.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      # Phase 2 steps will be added here:
      # - name: Score stocks
      #   run: python score_stocks.py
      # - name: Detect regime
      #   run: python regime_engine.py
      # - name: Send Telegram alerts
      #   run: python telegram_bot.py --send-alerts

      # ── 7. Save DB back to cache ─────────────────────────────────────────────
      - name: Save database cache
        uses: actions/cache@v4
        with:
          path: data/trades.db
          key: trades-db-${{ runner.os }}

      # ── 8. Upload logs as artifact ───────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
