# .github/workflows/daily_pipeline.yml
# NSE Swing Trader — Full Pipeline
# 08:00 IST Mon–Fri (02:30 UTC). Free tier.
#
# SAFE TO BE PUBLIC — no secrets in this file.
# Secrets live in: repo Settings → Secrets → Actions
#
# Required secrets (add once, never changes):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID

name: NSE Daily Pipeline

on:
  schedule:
    - cron: "30 2 * * 1-5"   # 02:30 UTC = 08:00 IST, Mon–Fri
  workflow_dispatch:           # manual "Run workflow" button for testing

env:
  # Opt into Node.js 24 now to silence deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    name: Fetch → Regime → Score → Alert
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Create directories — runners are blank slates, nothing pre-exists
      - name: Create required directories
        run: |
          mkdir -p data
          mkdir -p logs

      # Restore trades.db from cache (price data re-fetches, trades cannot)
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/trades.db
          key: trades-db-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            trades-db-${{ runner.os }}-

      - name: Initialise database
        run: python create_db.py

      # Safety net: restore trades from JSON backup if cache was evicted
      - name: Restore trades from backup
        run: python backup_trades.py --restore
        continue-on-error: true

      - name: Fetch market data
        run: python fetch_data.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Detect market regime
        run: python regime_engine.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Score all stocks
        run: python score_stocks.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Send Telegram alerts
        run: python telegram_bot.py --send-alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      # Backup trades table to JSON and commit back to repo
      # This is the safety net against cache eviction
      - name: Backup trades to JSON
        run: python backup_trades.py --backup

      - name: Commit trades backup
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trades_backup.json
          git diff --staged --quiet || git commit -m "chore: auto-backup trades [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save database cache
        uses: actions/cache@v4
        with:
          path: data/trades.db
          key: trades-db-${{ runner.os }}-${{ github.run_number }}

      # Upload logs — 'if: always()' ensures this runs even if earlier steps fail
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          if-no-files-found: ignore   # suppress warning when logs dir is empty
          retention-days: 7
